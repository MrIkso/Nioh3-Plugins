[LooseFileLoader]
; EnableAssetLoadingLog
; Values: 1 = enabled, 0 = disabled
; Default: 1
EnableAssetLoadingLog=0

; Disable streaming texture loading in the game. If you are debugging streaming textures (glts), set this to 1; otherwise, replacing files while the game is streaming textures may cause the game to crash.
; Values: 1 = disable, 0 = enabled
; Default: 1
DisableStreamingLoading=0

; Enable console window for logging
; Values: 1 = enabled, 0 = disabled
; Default: 0
EnableConsole=1